<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Signup</title>

  <link rel="stylesheet"
  href="style.css">
</head>

<body>

  <div class="card">

    <h2>Create Account</h2>

    <br>

    <input
type="text"
id="signupUsername"
placeholder="Enter Username"
>

    <br><br>
  
    <input
type="email"
id="signupEmail"
placeholder="Enter Email"
>

    <br><br>

    <input
type="password"
id="signupPassword"
placeholder="Enter Password"
>

    <br><br>

    <button onclick="signupUser()">
Signup
</button>

</div>
<script src="script.js"></script>

</body>
</html>
